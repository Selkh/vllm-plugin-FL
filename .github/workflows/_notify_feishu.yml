# Reusable workflow: Send CI status notification to Feishu
name: Feishu Notification

on:
  workflow_call:
    inputs:
      status:
        description: "Overall CI status (success / failure / cancelled)"
        required: true
        type: string
    secrets:
      FEISHU_APP_ID:
        required: true
      FEISHU_APP_SECRET:
        required: true
      FEISHU_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
      - name: Send Feishu notification
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          CI_STATUS: ${{ inputs.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          EVENT_NAME: ${{ github.event_name }}
        run: python3 .github/scripts/notify_feishu.py
